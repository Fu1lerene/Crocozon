services:
  items-data:
    build:
      context: .
      dockerfile: Crocozon.Services.ItemsData/Dockerfile
    ports:
      - "5002:5002"
    environment:
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=Production
      - PostgresOptions__ConnectionString=Host=items-data-db;Database=items_data;Username=${POSTGRES_USERNAME};Password=${POSTGRES_PASSWORD}
      - ASPNETCORE_URLS=http://+:5002
    depends_on:
      - items-data-db

  items-migrator:
    image: kukymbr/goose-docker:latest
    volumes:
      - ./Crocozon.Services.ItemsData/src/Crocozon.Services.ItemsData.Persistence/Migrations:/migrations
    command: up
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://postgres:postgres@items-data-db:5432/items_data
    depends_on:
      items-data-db:
        condition: service_healthy

  items-data-db:
    image: postgres:17
    environment:
      POSTGRES_DB: items_data
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d items_data" ]
      interval: 5s
      timeout: 5s
      retries: 5